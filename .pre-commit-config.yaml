repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v2.3.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: oxipng
        name: Optimize PNGs with oxipng
        entry: bash -c 'find . -name "*.png" -print0 | xargs -0 -r oxipng -o max -z --strip all'
        language: system
        pass_filenames: false
